services:
  tts-bot:
    build: .
    container_name: discord-tts-bot
    restart: unless-stopped
    init: true
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      # Mount thư mục data thay vì file đơn lẻ
      # SQLite WAL mode tạo .db, .db-wal, .db-shm → cần cả thư mục
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/bot.db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
